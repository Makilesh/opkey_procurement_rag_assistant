services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      EMBEDDING_DEVICE: cpu
      CHROMA_DIR: /app/storage/chroma
      BM25_PATH: /app/storage/chroma/bm25.pkl
      PREBUILT_INDEX_DIR: /app/prebuilt_index
      OLLAMA_FALLBACK_ENABLED: "false"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - chroma_data:/app/storage/chroma
      - hf_cache:/cache/hf
      - ./prebuilt_index:/app/prebuilt_index:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status==200 else 1)"]
      interval: 10s
      timeout: 8s
      retries: 30
      start_period: 60s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      API_URL: http://api:8000
    ports:
      - "${UI_PORT:-7860}:7860"
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
  chroma_data:
  hf_cache:
