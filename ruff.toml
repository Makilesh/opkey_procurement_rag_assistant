line-length = 100
target-version = "py312"

[lint]
# E/F: pycodestyle + pyflakes basics, I: import order, UP: py3.12 idioms, B: bugbear
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # long lines in prompts/README-adjacent strings are fine
    "B008",  # FastAPI Depends() in argument defaults is idiomatic
]

[lint.per-file-ignores]
"tests/*" = ["B017"]
